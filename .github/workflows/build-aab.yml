name: Build Signed AAB
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Suppress SDK warning
        run: echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
      - name: Decode Keystore
        run: base64 -d android/keystore.b64 > android/keystore.jks
      - name: Build Release AAB
        working-directory: android
        run: gradle bundleRelease
      - name: Sign AAB
        working-directory: android
        run: jarsigner -verbose -keystore keystore.jks -storepass "DSG-Upload-2026!" -keypass "DSG-Upload-2026!" app/build/outputs/bundle/release/app-release.aab upload
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: angle-signed-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
