<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Angle — Daily Loop</title>
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
  
  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(212,175,55,0.2)}
  .logo{font-size:20px;font-weight:700;color:#D4AF37;display:flex;align-items:center;gap:8px}
  .logo span{font-size:24px}
  .streak-badge{background:linear-gradient(135deg,#D4AF37,#B8941F);color:#000;font-weight:800;padding:6px 14px;border-radius:20px;font-size:14px;display:flex;align-items:center;gap:6px}
  .streak-badge .fire{font-size:16px}
  
  /* XP Bar */
  .xp-bar-container{padding:12px 20px;background:rgba(212,175,55,0.05)}
  .xp-label{font-size:12px;color:#D4AF37;margin-bottom:4px;display:flex;justify-content:space-between}
  .xp-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
  .xp-fill{height:100%;background:linear-gradient(90deg,#D4AF37,#FFD700);border-radius:3px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
  
  /* Card Area */
  .card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:linear-gradient(145deg,#1a1a1a,#0d0d0d);border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:32px 24px;max-width:400px;width:100%;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#D4AF37,transparent)}
  .card-label{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:#D4AF37;margin-bottom:8px}
  .card-date{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:20px}
  .card-title{font-size:22px;font-weight:700;margin-bottom:12px;line-height:1.3}
  .card-body{font-size:15px;line-height:1.7;color:rgba(255,255,255,0.8);margin-bottom:8px}
  .card-cta{font-size:14px;color:#D4AF37;font-weight:600;font-style:italic;margin-top:16px}
  
  /* XP Popup */
  .xp-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:48px;font-weight:900;color:#D4AF37;text-shadow:0 0 30px rgba(212,175,55,0.5);pointer-events:none;z-index:100;opacity:0;transition:none}
  .xp-popup.show{animation:xpBurst 0.8s cubic-bezier(0.4,0,0.2,1) forwards}
  @keyframes xpBurst{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}60%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-70%) scale(0.8);opacity:0}}
  
  /* Buttons */
  .actions{padding:20px;display:flex;gap:12px;max-width:400px;width:100%;margin:0 auto}
  .btn{flex:1;padding:16px 8px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.2s}
  .btn:active{transform:scale(0.95)}
  .btn-act{background:linear-gradient(135deg,#D4AF37,#B8941F);color:#000}
  .btn-act:hover{box-shadow:0 0 20px rgba(212,175,55,0.4)}
  .btn-save{background:rgba(255,255,255,0.1);color:#D4AF37;border:1px solid rgba(212,175,55,0.3)}
  .btn-save:hover{background:rgba(212,175,55,0.1)}
  .btn-skip{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4)}
  .btn-skip:hover{background:rgba(255,255,255,0.08)}
  
  /* Card transition */
  .card.exit{animation:cardExit 0.3s ease-in forwards}
  .card.enter{animation:cardEnter 0.3s ease-out forwards}
  @keyframes cardExit{to{transform:translateX(-100px);opacity:0}}
  @keyframes cardEnter{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
  
  /* Footer */
  .footer{text-align:center;padding:16px;font-size:11px;color:rgba(255,255,255,0.3);border-top:1px solid rgba(255,255,255,0.05)}
  .footer a{color:rgba(212,175,55,0.5);text-decoration:none}
  
  /* Empty state */
  .empty{text-align:center;padding:40px 20px}
  .empty .icon{font-size:64px;margin-bottom:16px}
  .empty h2{color:#D4AF37;margin-bottom:8px}
  .empty p{color:rgba(255,255,255,0.5);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span>📐</span> THE ANGLE</div>
  <div class="streak-badge"><span class="fire">🔥</span> <span id="streakCount">0</span> day streak</div>
</div>

<div class="xp-bar-container">
  <div class="xp-label">
    <span>LEVEL <span id="levelNum">1</span></span>
    <span><span id="xpCurrent">0</span> / <span id="xpNeeded">100</span> XP</span>
  </div>
  <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
</div>

<div class="card-area" id="cardArea">
  <!-- Card injected by JS -->
</div>

<div class="actions" id="actions">
  <button class="btn btn-act" onclick="respond('act')">⚡ Act</button>
  <button class="btn btn-save" onclick="respond('save')">💾 Save</button>
  <button class="btn btn-skip" onclick="respond('skip')">→ Skip</button>
</div>

<div class="xp-popup" id="xpPopup">XP +10</div>

<div class="footer">
  <a href="index.html">← Back to Home</a> &nbsp;|&nbsp; © 2026 MindWell Solution Group LLC
</div>

<script>
// === DAILY CARDS: THE ANGLE — Z-Logic Social Choreography ===
const CARDS = [
  {title:"The Mirror Move",body:"When someone shares a strong opinion today, don't counter it. Mirror their energy first: 'I can see why you'd feel that way.' Then pivot. Watch how the conversation shifts when they feel heard before challenged.",cta:"Try this in your next conversation today."},
  {title:"The 3-Second Pause",body:"Before responding to any emotionally charged message today, count to 3. Not to calm down—to let the other person wonder. Silence is the most underrated power move in communication.",cta:"Use this pause at least twice today."},
  {title:"The Name Drop",body:"Use someone's first name 3 times in a conversation today. Not in a salesy way—in a warmth way. 'That's a great point, Sarah.' People are hardwired to lean in when they hear their name.",cta:"Pick one conversation and make it personal."},
  {title:"The Exit Line",body:"End one conversation today BEFORE it peaks. Leave them wanting more. 'I'd love to keep going but I've got to run—let's pick this up.' Scarcity creates value in relationships too.",cta:"Exit one conversation at its high point."},
  {title:"The Curiosity Hook",body:"Ask someone a question today that they've NEVER been asked: 'What's the most interesting thing you've changed your mind about recently?' Novel questions create memorable interactions.",cta:"Deploy this question and watch what happens."},
  {title:"The Generous Intro",body:"Connect two people who don't know each other today. The introduction email/text takes 30 seconds but positions you as a hub, not a spoke. Hubs accumulate social capital exponentially.",cta:"Make one introduction before end of day."},
  {title:"The Frame Flip",body:"Take a complaint you hear today and reframe it as an opportunity. 'So what you're really saying is there's a gap in the market for...' Reframers are seen as visionaries, not just listeners.",cta:"Flip one negative into a positive out loud."},
  {title:"The Callback",body:"Reference something specific someone told you last time you spoke. 'You mentioned your daughter's recital—how did it go?' This signals 'I was actually listening' louder than any words.",cta:"Send one callback message to someone today."},
  {title:"The Strategic Compliment",body:"Compliment someone on their PROCESS, not their result. 'I love how you structured that presentation' hits different than 'nice job.' Process-praise builds deeper respect.",cta:"Give one process-focused compliment today."},
  {title:"The Soft No",body:"Decline one request today without using the word 'no.' Try: 'I'm fully committed this week, but I could look at this next Tuesday.' Boundaries delivered with alternatives build more respect than compliance.",cta:"Practice one soft no today."},
  {title:"The Power Question",body:"In your next meeting, ask: 'What would need to be true for this to work?' This single question reframes debate into collaborative problem-solving and positions you as the strategist in the room.",cta:"Ask this in your next group discussion."},
  {title:"The 10-Minute Favor",body:"Do one unsolicited favor today that takes you less than 10 minutes. Forward an article, make an intro, leave a recommendation. Small, unexpected generosity compounds into social capital.",cta:"Complete one micro-favor before 5pm."},
  {title:"The Vulnerability Play",body:"Share one genuine struggle or lesson-learned today. Not for sympathy—for connection. 'I totally botched a pitch last month and here's what I learned.' Vulnerability, when strategic, is magnetic.",cta:"Share one real lesson with someone today."},
  {title:"The Active Listen",body:"In your next conversation, don't formulate your response while they talk. Instead, when they finish, say: 'Let me make sure I got that right...' and paraphrase. This is the rarest skill in modern communication.",cta:"Paraphrase someone's point back to them today."}
];

// === STATE ===
let state = JSON.parse(localStorage.getItem('angle_state') || 'null') || {
  xp: 0, level: 1, streak: 0, lastDate: null, acted: [], saved: [], cardIndex: 0
};

function saveState(){ localStorage.setItem('angle_state', JSON.stringify(state)); }

// === STREAK CHECK ===
function checkStreak(){
  const today = new Date().toDateString();
  if(state.lastDate){
    const last = new Date(state.lastDate);
    const diff = Math.floor((new Date(today) - last) / 86400000);
    if(diff > 1) state.streak = 0;
  }
}
checkStreak();

// === RENDER ===
function getToday(){ return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }

function getDailyCard(){
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  return CARDS[dayOfYear % CARDS.length];
}

function renderCard(){
  const card = getDailyCard();
  const today = new Date().toDateString();
  const alreadyDone = state.acted.includes(today) || state.saved.includes(today);
  
  if(alreadyDone){
    document.getElementById('cardArea').innerHTML = `
      <div class="empty">
        <div class="icon">✅</div>
        <h2>Today's Card Complete</h2>
        <p>You've already engaged with today's card.<br>Come back tomorrow for your next move.</p>
        <p style="margin-top:20px;color:#D4AF37;font-size:18px;font-weight:700">🔥 ${state.streak} day streak</p>
      </div>`;
    document.getElementById('actions').style.display = 'none';
    return;
  }
  
  document.getElementById('cardArea').innerHTML = `
    <div class="card enter" id="activeCard">
      <div class="card-label">📐 Today's Angle</div>
      <div class="card-date">${getToday()}</div>
      <h2 class="card-title">${card.title}</h2>
      <p class="card-body">${card.body}</p>
      <p class="card-cta">${card.cta}</p>
    </div>`;
  document.getElementById('actions').style.display = 'flex';
}

function updateUI(){
  document.getElementById('streakCount').textContent = state.streak;
  document.getElementById('levelNum').textContent = state.level;
  const xpInLevel = state.xp % 100;
  const needed = 100;
  document.getElementById('xpCurrent').textContent = xpInLevel;
  document.getElementById('xpNeeded').textContent = needed;
  document.getElementById('xpFill').style.width = (xpInLevel / needed * 100) + '%';
}

function showXP(amount){
  const popup = document.getElementById('xpPopup');
  popup.textContent = `XP +${amount}`;
  popup.classList.remove('show');
  void popup.offsetWidth;
  popup.classList.add('show');
}

// === ACTIONS ===
function respond(action){
  const today = new Date().toDateString();
  const card = document.getElementById('activeCard');
  
  if(action === 'act'){
    state.xp += 10;
    state.acted.push(today);
    state.streak++;
    state.lastDate = today;
    showXP(10);
  } else if(action === 'save'){
    state.xp += 5;
    state.saved.push(today);
    state.streak++;
    state.lastDate = today;
    showXP(5);
  } else {
    state.lastDate = today;
  }
  
  // Level up check
  state.level = Math.floor(state.xp / 100) + 1;
  
  saveState();
  
  if(card) card.classList.add('exit');
  setTimeout(() => {
    renderCard();
    updateUI();
  }, 350);
}

// === INIT ===
renderCard();
updateUI();

// === KILL ZOMBIE SERVICE WORKERS ===
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(r => r.forEach(w => w.unregister()));
}
</script>
</body>
</html>
